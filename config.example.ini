[app]
name = pi-hud
environment = production

[api]
host = 127.0.0.1
port = 8765
lan_mode = false

[database]
path = /var/lib/pi-hud/pi-hud.db

[display]
enabled = true
rotation = 270
x_offset = 24
y_offset = 0
; BCM numbering — known-working wiring: DC=GPIO25, RST=GPIO27, BL=GPIO24
dc_pin = 25
rst_pin = 27
bl_pin = 24
spi_port = 0
spi_cs = 0
spi_speed_hz = 24000000
normal_refresh_seconds = 2
power_refresh_seconds = 10

[thresholds]
temp_warning_c = 65
temp_danger_c = 75
cpu_warning_percent = 70
cpu_danger_percent = 85
ram_warning_percent = 70
ram_danger_percent = 85

[messages]
default_pinned = false
max_message_chars = 500
max_metadata_chars = 4096
